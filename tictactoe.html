<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe 4x4</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #1e1e2e;
    color: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 2rem;
    box-sizing: border-box;
  }
  h1 { margin: 0 0 1rem; }
  #status {
    font-size: 1.25rem;
    margin: 1rem 0;
    min-height: 1.5em;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 6px;
    background: #444;
    padding: 6px;
    border-radius: 8px;
  }
  .cell {
    background: #2a2a3d;
    border: none;
    border-radius: 4px;
    font-size: 2.5rem;
    font-weight: bold;
    color: #f5f5f5;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover:not(:disabled) { background: #3a3a55; }
  .cell.x { color: #4fc3f7; }
  .cell.o { color: #ff8a65; }
  .cell.win { background: #2e7d32; }
  #controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }
  button.action {
    padding: 0.5rem 1rem;
    font-size: 1rem;
    background: #4fc3f7;
    color: #1e1e2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  button.action:hover { background: #81d4fa; }
  label { font-size: 0.95rem; }
  select {
    padding: 0.4rem;
    border-radius: 4px;
    border: 1px solid #555;
    background: #2a2a3d;
    color: #f5f5f5;
  }
</style>
</head>
<body>
  <h1>Tic Tac Toe (4x4)</h1>
  <div id="status">Spieler X ist am Zug</div>
  <div id="board"></div>
  <div id="controls">
    <label>Gewinnreihe:
      <select id="winLength">
        <option value="3">3 in einer Reihe</option>
        <option value="4" selected>4 in einer Reihe</option>
      </select>
    </label>
    <button class="action" id="reset">Neues Spiel</button>
  </div>

<script>
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const winLengthEl = document.getElementById('winLength');

  let cells = [];
  let board = [];
  let currentPlayer = 'X';
  let gameOver = false;
  let winLength = 4;

  function init() {
    boardEl.innerHTML = '';
    cells = [];
    board = Array(SIZE * SIZE).fill('');
    currentPlayer = 'X';
    gameOver = false;
    winLength = parseInt(winLengthEl.value, 10);
    statusEl.textContent = `Spieler ${currentPlayer} ist am Zug`;

    for (let i = 0; i < SIZE * SIZE; i++) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.dataset.index = i;
      btn.addEventListener('click', onCellClick);
      boardEl.appendChild(btn);
      cells.push(btn);
    }
  }

  function onCellClick(e) {
    if (gameOver) return;
    const idx = parseInt(e.currentTarget.dataset.index, 10);
    if (board[idx] !== '') return;

    board[idx] = currentPlayer;
    const btn = cells[idx];
    btn.textContent = currentPlayer;
    btn.classList.add(currentPlayer.toLowerCase());

    const winLine = findWin(currentPlayer);
    if (winLine) {
      winLine.forEach(i => cells[i].classList.add('win'));
      statusEl.textContent = `Spieler ${currentPlayer} gewinnt!`;
      gameOver = true;
      cells.forEach(c => c.disabled = true);
      return;
    }

    if (board.every(v => v !== '')) {
      statusEl.textContent = 'Unentschieden!';
      gameOver = true;
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusEl.textContent = `Spieler ${currentPlayer} ist am Zug`;
  }

  function findWin(player) {
    const directions = [
      [0, 1],   // horizontal
      [1, 0],   // vertical
      [1, 1],   // diagonal
      [1, -1],  // anti-diagonal
    ];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        for (const [dr, dc] of directions) {
          const line = [];
          for (let k = 0; k < winLength; k++) {
            const nr = r + dr * k;
            const nc = c + dc * k;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
            if (board[nr * SIZE + nc] !== player) break;
            line.push(nr * SIZE + nc);
          }
          if (line.length === winLength) return line;
        }
      }
    }
    return null;
  }

  resetBtn.addEventListener('click', init);
  winLengthEl.addEventListener('change', init);
  init();
</script>
</body>
</html>
